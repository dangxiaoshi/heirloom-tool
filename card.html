<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>传家宝 · 问题卡</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@400;500&family=Noto+Sans+SC:wght@300;400&display=swap" rel="stylesheet">
<style>
:root {
  --bg:      #F5F0E8;
  --surface: #FBF8F3;
  --ink:     #1C1714;
  --ink-2:   #5C5248;
  --ink-3:   #9C9088;
  --accent:  #8B5E3C;
  --green:   #4A5940;
  --gold:    #9B6F28;
  --serif:   'Noto Serif SC', serif;
  --sans:    'Noto Sans SC', sans-serif;
  --r:       18px;
  --shadow:  0 2px 4px rgba(28,23,20,.06), 0 8px 24px rgba(28,23,20,.10), 0 24px 48px rgba(28,23,20,.08);
}
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html { background: var(--bg); }
body {
  background: var(--bg);
  font-family: var(--sans);
  font-weight: 300;
  min-height: 100dvh;
  -webkit-font-smoothing: antialiased;
  display: flex;
  justify-content: center;
}
.app {
  width: 100%;
  max-width: 430px;
  min-height: 100dvh;
  display: flex;
  flex-direction: column;
  padding: 0 20px;
}

/* ── Screens ── */
.screen { display: none; flex-direction: column; flex: 1; }
.screen.active { display: flex; }

/* ══════════════════════════════
   Screen 1 — 称呼
══════════════════════════════ */
#s1 {
  align-items: center;
  justify-content: center;
  padding: 64px 0 80px;
  gap: 0;
}
.s1-logo {
  font-family: var(--serif);
  font-size: 56px;
  color: var(--accent);
  line-height: 1;
  margin-bottom: 4px;
}
.s1-brand {
  font-family: var(--serif);
  font-size: 14px;
  color: var(--ink-3);
  letter-spacing: 0.35em;
  margin-bottom: 64px;
}
.field-label {
  align-self: flex-start;
  font-size: 12px;
  color: var(--ink-3);
  letter-spacing: 0.08em;
  margin-bottom: 10px;
}
.name-input {
  width: 100%;
  background: var(--surface);
  border: 1px solid rgba(92,82,72,.15);
  border-radius: 12px;
  padding: 14px 16px;
  font-family: var(--serif);
  font-size: 22px;
  color: var(--ink);
  outline: none;
  transition: border-color .2s;
  margin-bottom: 24px;
}
.name-input:focus { border-color: rgba(139,94,60,.4); }
.name-input::placeholder {
  color: var(--ink-3);
  font-family: var(--sans);
  font-size: 15px;
  font-weight: 300;
}

/* ══════════════════════════════
   Screen 2 — 开场白
══════════════════════════════ */
#s2 {
  padding: 52px 0 40px;
  justify-content: space-between;
  gap: 32px;
}
.speech-scroll {
  flex: 1;
  overflow-y: auto;
  -webkit-overflow-scrolling: touch;
}
.speech-lines { display: flex; flex-direction: column; gap: 22px; }
.speech-line { display: flex; gap: 12px; align-items: flex-start; }
.speech-bar {
  width: 2px;
  flex-shrink: 0;
  min-height: 20px;
  background: var(--accent);
  opacity: 0.25;
  border-radius: 2px;
  margin-top: 5px;
}
.speech-text {
  font-size: 15px;
  line-height: 1.85;
  color: var(--ink-2);
}
.speech-text em {
  font-style: normal;
  font-family: var(--serif);
  color: var(--accent);
}

/* ══════════════════════════════
   Screen 3 — 主界面
══════════════════════════════ */
#s3 { padding: 44px 0 48px; align-items: center; }

/* ── Pile ── */
#pile-view {
  display: none;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  width: 100%;
  flex: 1;
  gap: 44px;
}
.pile-wrapper {
  position: relative;
  width: 220px;
  height: 308px;
  cursor: pointer;
  -webkit-tap-highlight-color: transparent;
}
.pile-wrapper:active { transform: scale(.97); }
.pile-card {
  position: absolute;
  inset: 0;
  border-radius: 16px;
  overflow: hidden;
  display: flex;
  align-items: center;
  justify-content: center;
  box-shadow: var(--shadow);
}
.pile-card.pc3 {
  background: var(--green);
  transform: rotate(3deg) translate(8px, 4px);
  filter: brightness(.78);
}
.pile-card.pc2 {
  background: var(--gold);
  transform: rotate(1.5deg) translate(4px, 2px);
  filter: brightness(.88);
}
.pile-card.pc1 {
  background: var(--accent);
  transform: rotate(0deg) translate(0,0);
  transition: transform .18s ease;
}
.pile-wrapper:hover .pc1,
.pile-wrapper:active .pc1 {
  transform: rotate(0deg) translate(0,-5px);
}
.pile-inner {
  width: 100%; height: 100%;
  position: relative;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
}
.pile-inner::before {
  content: '';
  position: absolute;
  inset: 13px;
  border: 1px solid rgba(255,255,255,.14);
  border-radius: 9px;
  pointer-events: none;
}
.pile-deco {
  position: absolute;
  font-family: var(--serif);
  font-size: 190px;
  font-weight: 500;
  color: rgba(255,255,255,.06);
  top: 50%; left: 50%;
  transform: translate(-50%, -50%);
  pointer-events: none;
  user-select: none;
  line-height: 1;
}
.pile-brand {
  position: relative;
  z-index: 1;
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 7px;
}
.pile-brand-char {
  font-family: var(--serif);
  font-size: 42px;
  color: rgba(255,255,255,.9);
  line-height: 1;
}
.pile-brand-name {
  font-family: var(--serif);
  font-size: 12px;
  color: rgba(255,255,255,.5);
  letter-spacing: 0.32em;
}
.pile-hint {
  font-size: 12px;
  color: var(--ink-3);
  letter-spacing: 0.06em;
}
.progress-wrap {
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 9px;
}
.progress-text {
  font-size: 12px;
  color: var(--ink-3);
  letter-spacing: 0.05em;
}
.progress-track {
  width: 100px;
  height: 2px;
  background: rgba(92,82,72,.12);
  border-radius: 2px;
  overflow: hidden;
}
.progress-fill {
  height: 100%;
  background: var(--accent);
  border-radius: 2px;
  transition: width .6s cubic-bezier(.4,0,.2,1);
}

/* ── Card View ── */
#card-view {
  display: none;
  flex-direction: column;
  align-items: center;
  width: 100%;
  gap: 14px;
}

/* Flip via scaleX at midpoint */
.flip-wrap {
  width: 100%;
  max-width: 340px;
}
.flip-card {
  width: 100%;
  border-radius: var(--r);
  overflow: hidden;
  box-shadow: var(--shadow);
  transform-origin: center center;
}
.flip-card.flipping {
  animation: scaleFlip .5s ease;
}
@keyframes scaleFlip {
  0%   { transform: scaleX(1); }
  45%  { transform: scaleX(0); }
  55%  { transform: scaleX(0); }
  100% { transform: scaleX(1); }
}

/* Card Back Design */
.cback {
  background: var(--accent);
  min-height: 380px;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  position: relative;
  overflow: hidden;
}
.cback::before {
  content: '';
  position: absolute;
  inset: 14px;
  border: 1px solid rgba(255,255,255,.16);
  border-radius: 10px;
  pointer-events: none;
}
.cback-deco {
  position: absolute;
  font-family: var(--serif);
  font-size: 250px;
  font-weight: 500;
  color: rgba(255,255,255,.07);
  top: 50%; left: 50%;
  transform: translate(-50%, -50%);
  user-select: none;
  pointer-events: none;
  line-height: 1;
}
.cback-center {
  position: relative;
  z-index: 1;
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 8px;
}
.cback-char {
  font-family: var(--serif);
  font-size: 52px;
  color: rgba(255,255,255,.92);
  line-height: 1;
}
.cback-name {
  font-family: var(--serif);
  font-size: 13px;
  color: rgba(255,255,255,.5);
  letter-spacing: 0.3em;
}

/* Card Face Design */
.cface { background: var(--surface); }
.cface-top {
  padding: 28px 22px 20px;
  position: relative;
  overflow: hidden;
  min-height: 138px;
  display: flex;
  flex-direction: column;
  justify-content: flex-end;
}
.cface-bg {
  position: absolute;
  top: -22px; right: -10px;
  font-family: var(--serif);
  font-size: 160px;
  font-weight: 600;
  color: rgba(255,255,255,.08);
  user-select: none;
  pointer-events: none;
  line-height: 1;
}
.cface-tag {
  font-size: 10px;
  color: rgba(255,255,255,.5);
  letter-spacing: 0.14em;
  margin-bottom: 9px;
  position: relative; z-index: 1;
}
.cface-chars {
  font-family: var(--serif);
  font-size: 52px;
  font-weight: 400;
  color: rgba(255,255,255,.95);
  line-height: 1.1;
  letter-spacing: 0.06em;
  text-shadow: 0 2px 16px rgba(0,0,0,.15);
  position: relative; z-index: 1;
}
.cface-sub {
  font-family: var(--serif);
  font-size: 13px;
  font-weight: 300;
  color: rgba(255,255,255,.55);
  margin-top: 6px;
  position: relative; z-index: 1;
}
.cface-bottom {
  padding: 16px 20px 20px;
  background: var(--surface);
}
.qs-list {
  display: flex;
  flex-direction: column;
  gap: 10px;
  margin-bottom: 16px;
}
.q-row { display: flex; gap: 8px; align-items: flex-start; }
.q-num {
  font-size: 10px;
  font-weight: 400;
  color: var(--ink-3);
  min-width: 14px;
  padding-top: 3px;
  flex-shrink: 0;
  opacity: .6;
}
.q-txt {
  font-size: 13px;
  font-weight: 300;
  color: var(--ink-2);
  line-height: 1.65;
}

/* ── Card action buttons ── */
.card-actions {
  display: flex;
  flex-direction: column;
  gap: 10px;
  width: 100%;
  max-width: 340px;
}

/* ── Done View ── */
#done-view {
  display: none;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  flex: 1;
  gap: 24px;
  text-align: center;
  padding: 48px 0;
}
.done-char {
  font-family: var(--serif);
  font-size: 72px;
  color: var(--accent);
  line-height: 1;
  opacity: .8;
}
.done-title {
  font-family: var(--serif);
  font-size: 22px;
  font-weight: 400;
  color: var(--ink);
  letter-spacing: 0.05em;
}
.done-sub {
  font-size: 14px;
  color: var(--ink-3);
  line-height: 1.8;
}

/* ══════════════════════════════
   Shared Buttons
══════════════════════════════ */
.btn-solid {
  display: flex;
  align-items: center;
  justify-content: center;
  width: 100%;
  min-height: 52px;
  background: var(--accent);
  color: rgba(255,255,255,.95);
  border: none;
  border-radius: 9999px;
  font-family: var(--sans);
  font-size: 15px;
  font-weight: 400;
  letter-spacing: 0.04em;
  cursor: pointer;
  transition: opacity .2s, transform .1s;
  -webkit-tap-highlight-color: transparent;
}
.btn-solid:active { opacity: .82; transform: scale(.98); }

.btn-ghost {
  display: flex;
  align-items: center;
  justify-content: center;
  width: 100%;
  min-height: 46px;
  background: transparent;
  border: 1px solid rgba(139,94,60,.22);
  border-radius: 9999px;
  font-family: var(--sans);
  font-size: 13px;
  font-weight: 400;
  color: var(--accent);
  cursor: pointer;
  letter-spacing: 0.04em;
  transition: background .2s, border-color .2s;
  -webkit-tap-highlight-color: transparent;
}
.btn-ghost:hover { background: rgba(139,94,60,.06); border-color: rgba(139,94,60,.32); }
.btn-ghost:disabled { opacity: .3; cursor: default; }
.btn-ghost:active:not(:disabled) { opacity: .7; }

/* ready button — larger tap area */
#btn-ready {
  min-height: 58px;
  font-size: 16px;
}
</style>
</head>
<body>
<div class="app">

  <!-- ══ Screen 1: 称呼 ══ -->
  <div class="screen active" id="s1">
    <div class="s1-logo">传</div>
    <div class="s1-brand">传 家 宝</div>
    <div class="field-label">今天采访的是？</div>
    <input
      class="name-input"
      id="name-input"
      type="text"
      placeholder="外公、爷爷、妈妈…"
      maxlength="10"
      autocomplete="off"
      autocorrect="off"
      spellcheck="false"
    >
    <button class="btn-solid" onclick="goSpeech()">开始</button>
  </div>

  <!-- ══ Screen 2: 开场白 ══ -->
  <div class="screen" id="s2">
    <div class="speech-scroll">
      <div class="speech-lines">
        <div class="speech-line">
          <div class="speech-bar"></div>
          <p class="speech-text"><em id="s2-name">外公</em>，今天我想跟您做一件特别的事。</p>
        </div>
        <div class="speech-line">
          <div class="speech-bar"></div>
          <p class="speech-text">我买了一套叫「传家宝」的问题卡片。里面有 21 张卡，每张卡都是一个话题——关于您的童年、您的父母、您这辈子做过的选择、让您骄傲的事、还有您最想告诉我们的话。</p>
        </div>
        <div class="speech-line">
          <div class="speech-bar"></div>
          <p class="speech-text">我们每次只抽一张，我来问，您来说，不用准备，想到哪里说哪里。说错了没关系，跳过也没关系。</p>
        </div>
        <div class="speech-line">
          <div class="speech-bar"></div>
          <p class="speech-text">我想把您说的话都留下来，留给我们家。</p>
        </div>
      </div>
    </div>
    <button class="btn-solid" id="btn-ready" onclick="goPile()">我准备好了</button>
  </div>

  <!-- ══ Screen 3: 主界面 ══ -->
  <div class="screen" id="s3">

    <!-- 牌堆 -->
    <div id="pile-view">
      <div class="pile-wrapper" id="pile-wrapper" onclick="drawCard()">
        <!-- 第3张：最底 -->
        <div class="pile-card pc3">
          <div class="pile-inner">
            <span class="pile-deco">传</span>
          </div>
        </div>
        <!-- 第2张：中间 -->
        <div class="pile-card pc2">
          <div class="pile-inner">
            <span class="pile-deco">传</span>
          </div>
        </div>
        <!-- 第1张：最上 -->
        <div class="pile-card pc1">
          <div class="pile-inner">
            <span class="pile-deco">传</span>
            <div class="pile-brand">
              <span class="pile-brand-char">传</span>
              <span class="pile-brand-name">传 家 宝</span>
            </div>
          </div>
        </div>
      </div>

      <p class="pile-hint" id="pile-hint">点击牌堆，抽出今天的话题</p>

      <div class="progress-wrap">
        <div class="progress-text" id="prog-text">已完成 0 / 21</div>
        <div class="progress-track">
          <div class="progress-fill" id="prog-fill" style="width:0%"></div>
        </div>
      </div>
    </div>

    <!-- 翻开的卡 -->
    <div id="card-view">
      <div class="flip-wrap">
        <div class="flip-card" id="flip-card">
          <!-- content injected by JS -->
        </div>
      </div>
      <div class="card-actions">
        <button class="btn-ghost" id="btn-swap" onclick="swapCard()">换一张</button>
      </div>
    </div>

    <!-- 全部完成 -->
    <div id="done-view">
      <div class="done-char">传</div>
      <div class="done-title">全部聊完了</div>
      <div class="done-sub" id="done-sub">
        21 张卡都聊过了<br>留下了一段珍贵的家族记忆
      </div>
      <button class="btn-ghost" style="max-width:200px" onclick="resetSession()">重新开始</button>
    </div>

  </div>

</div><!-- .app -->
<p style="text-align:center;font-size:11px;color:#9C9088;letter-spacing:0.06em;padding:16px 0 24px;">WeChat: gaoqiantongxue</p>

<script>
/* ═══════════════════════════════════════
   卡片数据
═══════════════════════════════════════ */
const COLORS = { accent: '#8B5E3C', green: '#4A5940', gold: '#9B6F28' };

const CARDS = [
  { id:1,  fw:'时间维度', fwNum:'01/07', color:'accent', twoChar:'旧宅', name:'童年的家',     deco:'旧', qs:[
    '您小时候住在哪里？能描述一下那个房子或院子吗？',

    '那时候最喜欢哪个老师？为什么？',
    '有没有特别擅长或特别不行的科目？',
    '有没有因为家里的原因没能继续念书？那时候心里什么感受？',

  { id:4,  fw:'时间维度', fwNum:'04/07', color:'accent', twoChar:'情缘', name:'爱情那一章',   deco:'缘', qs:[

  { id:5,  fw:'时间维度', fwNum:'05/07', color:'accent', twoChar:'骨肉', name:'为人父母',     deco:'骨', qs:[
    '还记得第一次抱着孩子的感受吗？',
    '孩子小时候，最让您骄傲的一件事是什么？',
    '养孩子过程中，最让您担心的是什么？',

  { id:6,  fw:'时间维度', fwNum:'06/07', color:'accent', twoChar:'负重', name:'中年的重量',   deco:'重', qs:[
    '这一生，最重的一段时间是什么时候？',
    '那段时间里，是什么让您撑过来的？',
    '您有没有经历过真正意义上的「失去」？',
    '身体这辈子什么时候最让您警醒过？有没有一场病改变了您对生命的看法？',
    '有没有一件事，当时没有对任何人说，现在可以说了？（不想说可以跳过）',
    '人到中年，您最大的领悟是什么？',

/* ═══════════════════════════════════════
   状态
═══════════════════════════════════════ */
let personName = '';
let completed = new Set();
let swapsLeft = 2;
let currentCard = null;
let isFlipping = false;

/* ─── LocalStorage ─── */
function storageKey() { return 'heirloom_' + personName; }

function loadProgress() {
  try {
    const raw = localStorage.getItem(storageKey());
    if (raw) {
      const data = JSON.parse(raw);
      completed = new Set(data.completed || []);
    } else {
      completed = new Set();
    }
  } catch(e) { completed = new Set(); }
}

function saveProgress() {
  try {
    localStorage.setItem(storageKey(), JSON.stringify({ completed: [...completed] }));
  } catch(e) {}
}

/* ─── Screen helpers ─── */
function setScreen(id) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.getElementById(id).classList.add('active');
}

function showView(id) {
  ['pile-view', 'card-view', 'done-view'].forEach(v => {
    document.getElementById(v).style.display = v === id ? 'flex' : 'none';
  });
}

/* ═══════════════════════════════════════
   Screen flow
═══════════════════════════════════════ */
function goSpeech() {
  const val = document.getElementById('name-input').value.trim();
  personName = val || '您';
  loadProgress();
  document.getElementById('s2-name').textContent = personName;
  setScreen('s2');
}

function goPile() {
  setScreen('s3');
  showPile();
}

function showPile() {
  updateProgress();
  const remaining = CARDS.filter(c => !completed.has(c.id));
  if (remaining.length === 0) {
    showDone();
    return;
  }

  // Update pile hint
  const hint = document.getElementById('pile-hint');
  hint.textContent = remaining.length === 21
    ? '点击牌堆，抽出今天的话题'
    : `还剩 ${remaining.length} 张，继续抽`;

  showView('pile-view');
}

function showDone() {
  document.getElementById('done-sub').innerHTML =
    `和 <strong style="color:var(--accent)">${personName}</strong> 的 21 张卡都聊过了<br>留下了一段珍贵的家族记忆`;
  showView('done-view');
}

function updateProgress() {
  const n = completed.size;
  document.getElementById('prog-text').textContent = `已完成 ${n} / 21`;
  document.getElementById('prog-fill').style.width = `${(n / 21) * 100}%`;
}

function resetSession() {
  completed = new Set();
  saveProgress();
  currentCard = null;
  showPile();
}

/* ═══════════════════════════════════════
   抽卡逻辑
═══════════════════════════════════════ */
function remaining() {
  return CARDS.filter(c => !completed.has(c.id));
}

function pickRandom(pool) {
  return pool[Math.floor(Math.random() * pool.length)];
}

function drawCard() {
  if (isFlipping) return;
  const pool = remaining();
  if (pool.length === 0) { showDone(); return; }

  currentCard = pickRandom(pool);
  swapsLeft = 2;

  showView('card-view');
  renderCover(currentCard);
  updateSwapBtn();

  // Auto-flip to face after cover shows briefly
  setTimeout(() => flipToFace(currentCard), 400);
}

function swapCard() {
  if (isFlipping || swapsLeft <= 0) return;
  const pool = remaining().filter(c => c.id !== currentCard.id);
  if (pool.length === 0) return;

  swapsLeft--;
  updateSwapBtn();

  // Flip back to cover, then to new face
  isFlipping = true;
  const fc = document.getElementById('flip-card');
  fc.classList.add('flipping');

  // At animation midpoint (225ms), swap to new card back
  setTimeout(() => {
    currentCard = pickRandom(pool);
    renderCover(currentCard);
  }, 225);

  // At animation end (500ms), flip to new face
  setTimeout(() => {
    fc.classList.remove('flipping');
    isFlipping = false;
    setTimeout(() => flipToFace(currentCard), 200);
  }, 500);
}

function markDone() {
  if (!currentCard || isFlipping) return;
  completed.add(currentCard.id);
  saveProgress();

  // Flip back to cover, then return to pile
  isFlipping = true;
  const fc = document.getElementById('flip-card');
  fc.classList.add('flipping');

  setTimeout(() => { renderCover(currentCard); }, 225);

  setTimeout(() => {
    fc.classList.remove('flipping');
    isFlipping = false;
    setTimeout(() => showPile(), 200);
  }, 500);
}

/* ─── Flip to face ─── */
function flipToFace(card) {
  if (isFlipping) return;
  isFlipping = true;
  const fc = document.getElementById('flip-card');
  fc.classList.add('flipping');

  setTimeout(() => { renderFace(card); }, 225);

  setTimeout(() => {
    fc.classList.remove('flipping');
    isFlipping = false;
  }, 500);
}

/* ═══════════════════════════════════════
   渲染
═══════════════════════════════════════ */
function renderCover(card) {
  const col = COLORS[card.color];
  document.getElementById('flip-card').innerHTML = `
    <div class="cback" style="background:${col}">
      <span class="cback-deco">${card.deco}</span>
      <div class="cback-center">
        <span class="cback-char">${card.twoChar}</span>
        <span class="cback-name">传 家 宝</span>
      </div>
    </div>
  `;
}

function renderFace(card) {
  const col = COLORS[card.color];
  const qs = card.qs.map((q, i) => `
    <div class="q-row">
      <span class="q-num" style="color:${col}">${i + 1}</span>
      <span class="q-txt">${q}</span>
    </div>
  `).join('');

  document.getElementById('flip-card').innerHTML = `
    <div class="cface">
      <div class="cface-top" style="background:${col}">
        <span class="cface-bg">${card.deco}</span>
        <div class="cface-tag">${card.fw} · ${card.fwNum}</div>
        <div class="cface-chars">${card.twoChar}</div>
        <div class="cface-sub">${card.name}</div>
      </div>
      <div class="cface-bottom">
        <div class="qs-list">${qs}</div>
        <button class="btn-solid" onclick="markDone()" style="font-size:14px;min-height:48px;background:${col}">
          这张聊完了 ✓
        </button>
      </div>
    </div>
  `;
}

function updateSwapBtn() {
  const btn = document.getElementById('btn-swap');
  btn.disabled = swapsLeft <= 0;
  btn.textContent = swapsLeft > 0
    ? `换一张（还可换 ${swapsLeft} 次）`
    : '已换过两次了';
}

/* ═══════════════════════════════════════
   键盘支持
═══════════════════════════════════════ */
document.getElementById('name-input').addEventListener('keydown', e => {
  if (e.key === 'Enter') goSpeech();
});
