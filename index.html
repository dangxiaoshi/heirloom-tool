<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>传家宝｜在遗忘之前，记住</title>
<style>
  :root {
    --ink: #4e5275;
    --ink-deep: #333a61;
    --ink-soft: rgba(78, 82, 117, .72);
    --paper: rgba(255, 249, 238, .86);
    --paper-soft: rgba(255, 249, 238, .58);
    --gold: #f1c984;
    --gold-soft: rgba(241, 201, 132, .42);
    --line: rgba(255, 238, 206, .52);
  }

  * {
    box-sizing: border-box;
  }

  html,
  body {
    margin: 0;
    min-height: 100%;
    color: var(--ink);
    background: #c4c4df;
    font-family: "PingFang SC", "Hiragino Sans GB", "Microsoft YaHei", sans-serif;
  }

  body {
    overflow-x: hidden;
  }

  .hero {
    position: relative;
    min-height: calc(92svh - 76px);
    overflow: hidden;
    background:
      linear-gradient(90deg, rgba(86, 91, 137, .08) 0%, rgba(255, 247, 232, .02) 48%, rgba(255, 247, 232, .72) 100%),
      linear-gradient(180deg, rgba(139, 143, 188, .18) 0%, rgba(255, 245, 226, .08) 68%, rgba(255, 247, 232, .38) 100%),
      url("assets/传家宝首页主视觉.png") 36% center / cover no-repeat;
  }

  .hero::after {
    content: "";
    position: absolute;
    inset: 0;
    background:
      radial-gradient(44% 54% at 73% 48%, rgba(255, 247, 232, .44), rgba(255, 247, 232, 0) 70%),
      radial-gradient(32% 38% at 55% 54%, rgba(255, 220, 168, .2), rgba(255, 220, 168, 0) 72%);
    pointer-events: none;
  }

  .nav {
    position: relative;
    z-index: 2;
    display: flex;
    align-items: center;
    justify-content: space-between;
    width: min(1180px, calc(100% - 48px));
    margin: 0 auto;
    padding: 28px 0 0;
  }

  .brand {
    display: flex;
    align-items: baseline;
    gap: 12px;
    color: rgba(255, 249, 238, .92);
    text-shadow: 0 12px 32px rgba(44, 47, 84, .28);
  }

  .brand strong {
    font-family: "Songti SC", "STSong", "Noto Serif CJK SC", serif;
    font-size: 28px;
    font-weight: 400;
    letter-spacing: .08em;
  }

  .brand span {
    font-size: 12px;
    letter-spacing: .18em;
    text-transform: uppercase;
    opacity: .72;
  }

  .site-meta {
    position: absolute;
    left: 50%;
    bottom: 14px;
    z-index: 2;
    display: flex;
    flex-direction: row;
    align-items: center;
    justify-content: center;
    gap: 14px;
    width: min(760px, calc(100% - 32px));
    transform: translateX(-50%);
    text-align: center;
    color: rgba(255, 249, 238, .76);
    text-shadow: 0 10px 26px rgba(44, 47, 84, .2);
    white-space: nowrap;
  }

  .site-meta a {
    color: currentColor;
    text-decoration: none;
    white-space: nowrap;
  }

  .site-url,
  .wechat-line,
  .icp-link {
    color: currentColor;
    font-family: Georgia, "Times New Roman", serif;
    font-size: 11px;
    letter-spacing: .06em;
    line-height: 1;
    opacity: .76;
    white-space: nowrap;
  }

  .corner-mark {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    width: 38px;
    height: 38px;
    border: 1px solid rgba(255, 246, 228, .58);
    border-radius: 50%;
    color: rgba(255, 249, 238, .9);
    background: rgba(255, 249, 238, .14);
    box-shadow: 0 16px 34px rgba(44, 47, 84, .16);
    backdrop-filter: blur(10px);
    font-family: "Songti SC", "STSong", "Noto Serif CJK SC", serif;
    font-size: 20px;
    font-weight: 300;
    text-decoration: none;
  }

  .hero-inner {
    position: relative;
    z-index: 2;
    display: grid;
    grid-template-columns: minmax(0, 1fr) minmax(360px, 520px);
    align-items: center;
    width: min(1180px, calc(100% - 48px));
    min-height: 92svh;
    margin: 0 auto;
    padding: 42px 0 72px;
  }

  .copy {
    grid-column: 2;
    max-width: 520px;
    color: var(--ink-deep);
    text-shadow: 0 12px 34px rgba(255, 251, 244, .62);
  }

  .eyebrow {
    margin: 0 0 22px;
    color: rgba(78, 82, 117, .68);
    font-size: 13px;
    letter-spacing: .22em;
  }

  h1 {
    margin: 0;
    font-family: "Songti SC", "STSong", "Noto Serif CJK SC", serif;
    font-size: clamp(48px, 5.3vw, 76px);
    font-weight: 300;
    line-height: 1.08;
    letter-spacing: 0;
  }

  h1 span {
    display: block;
    white-space: nowrap;
  }

  .hero-en {
    margin: 18px 0 0;
    color: rgba(78, 82, 117, .58);
    font-family: Georgia, "Times New Roman", serif;
    font-size: clamp(12px, 1vw, 14px);
    letter-spacing: .16em;
    line-height: 1.5;
    text-transform: uppercase;
  }

  .lead {
    max-width: 450px;
    margin: 18px 0 0;
    color: var(--ink-soft);
    font-size: clamp(17px, 1.45vw, 21px);
    font-weight: 300;
    line-height: 1.92;
  }

  .lead-en {
    max-width: 430px;
    margin: 12px 0 0;
    color: rgba(78, 82, 117, .5);
    font-family: Georgia, "Times New Roman", serif;
    font-size: 13px;
    letter-spacing: .08em;
    line-height: 1.7;
  }

  .actions {
    display: flex;
    flex-wrap: wrap;
    justify-content: flex-end;
    gap: 14px;
    margin-top: 38px;
  }

  .button {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    flex-direction: column;
    min-height: 48px;
    padding: 0 24px;
    border: 1px solid rgba(255, 246, 228, .66);
    border-radius: 999px;
    color: var(--ink-deep);
    background: rgba(255, 249, 238, .42);
    box-shadow: 0 18px 44px rgba(63, 67, 106, .12);
    backdrop-filter: blur(10px);
    font-size: 15px;
    letter-spacing: .04em;
    text-decoration: none;
    white-space: nowrap;
  }

  .button small {
    margin-top: 2px;
    font-family: Georgia, "Times New Roman", serif;
    font-size: 10px;
    letter-spacing: .14em;
    text-transform: uppercase;
    opacity: .62;
  }

  .button.primary {
    border-color: rgba(255, 235, 199, .9);
    background: rgba(255, 240, 207, .68);
  }

  .micro {
    display: flex;
    flex-wrap: wrap;
    gap: 12px;
    margin-top: 28px;
    color: rgba(78, 82, 117, .56);
    font-size: 13px;
    letter-spacing: .06em;
  }

  .micro span {
    display: inline-flex;
    align-items: center;
    gap: 12px;
  }

  .micro span::before {
    content: "";
    width: 5px;
    height: 5px;
    border-radius: 50%;
    background: var(--gold);
    box-shadow: 0 0 16px rgba(241, 201, 132, .8);
  }

  .flow {
    position: relative;
    z-index: 3;
    min-height: 42svh;
    padding: 54px 24px 68px;
    background:
      linear-gradient(180deg, rgba(255, 247, 232, .9), rgba(241, 238, 245, .96)),
      #f5f1ed;
  }

  .flow-inner {
    width: min(1120px, 100%);
    margin: 0 auto;
  }

  .flow-heading {
    display: flex;
    justify-content: space-between;
    gap: 24px;
    align-items: flex-end;
    margin-bottom: 30px;
  }

  .flow-heading h2 {
    margin: 0;
    color: var(--ink-deep);
    font-family: "Songti SC", "STSong", "Noto Serif CJK SC", serif;
    font-size: clamp(30px, 3.2vw, 46px);
    font-weight: 300;
    line-height: 1.18;
  }

  .flow-heading p {
    max-width: 390px;
    margin: 0;
    color: rgba(78, 82, 117, .64);
    font-size: 15px;
    line-height: 1.8;
  }

  .steps {
    display: grid;
    grid-template-columns: repeat(4, minmax(0, 1fr));
    gap: 1px;
    border: 1px solid var(--line);
    background: var(--line);
  }

  .step {
    min-height: 178px;
    padding: 26px 24px;
    background: rgba(255, 252, 245, .62);
  }

  .step-num {
    color: rgba(241, 161, 112, .92);
    font-family: "Songti SC", "STSong", serif;
    font-size: 15px;
  }

  .step h3 {
    margin: 22px 0 12px;
    color: var(--ink-deep);
    font-family: "Songti SC", "STSong", "Noto Serif CJK SC", serif;
    font-size: 24px;
    font-weight: 300;
  }

  .step p {
    margin: 0;
    color: rgba(78, 82, 117, .66);
    font-size: 14px;
    line-height: 1.74;
  }

  @media (max-width: 900px) {
    .hero {
      min-height: calc(91svh - 64px);
      background-position: 32% center;
    }

    .nav {
      width: min(100% - 32px, 680px);
      padding-top: 20px;
    }

    .site-meta {
      bottom: 12px;
      gap: 7px;
    }

    .brand strong {
      font-size: 24px;
    }

    .hero-inner {
      display: flex;
      align-items: flex-start;
      width: min(100% - 32px, 680px);
      min-height: calc(100svh - 64px);
      padding: clamp(230px, 34svh, 360px) 0 0;
    }

    .copy {
      position: relative;
      width: 100%;
      max-width: 460px;
      min-height: clamp(310px, 42svh, 390px);
      padding-bottom: 92px;
      color: rgba(52, 57, 94, .92);
    }

    h1 {
      font-size: clamp(44px, 12vw, 58px);
    }

    .lead {
      max-width: 330px;
      margin-top: 18px;
      font-size: 16px;
      line-height: 1.72;
    }

    .lead-en {
      max-width: 320px;
      margin-top: 10px;
      font-size: 11px;
      letter-spacing: .06em;
      line-height: 1.55;
    }

    .actions {
      justify-content: flex-end;
      position: absolute;
      right: 0;
      bottom: 24px;
      margin-top: 0;
    }

    .button {
      min-width: 116px;
      min-height: 62px;
      padding: 0 22px;
      font-size: 15px;
    }

    .flow {
      padding: 42px 16px 58px;
    }

    .flow-heading {
      display: block;
    }

    .flow-heading p {
      margin-top: 16px;
    }

    .steps {
      grid-template-columns: 1fr;
    }

    .step {
      min-height: auto;
    }
  }

  @media (max-width: 480px) {
    .hero {
      background:
        linear-gradient(180deg, rgba(255, 247, 232, .12) 0%, rgba(255, 247, 232, .78) 62%, rgba(255, 247, 232, .9) 100%),
        url("assets/传家宝首页主视觉.png") 31% center / cover no-repeat;
    }

    .hero::after {
      background: radial-gradient(70% 42% at 50% 76%, rgba(255, 247, 232, .74), rgba(255, 247, 232, 0) 78%);
    }

    .copy {
      text-shadow: 0 10px 30px rgba(255, 251, 244, .76);
    }

    .eyebrow {
      margin-bottom: 16px;
      font-size: 12px;
      letter-spacing: .16em;
    }

    .lead {
      max-width: 330px;
    }

    .brand span {
      display: none;
    }

    .site-url,
    .wechat-line,
    .icp-link {
      font-size: 8px;
      letter-spacing: 0;
    }

    .hero-en {
      font-size: 11px;
      letter-spacing: .12em;
    }

    .micro {
      display: none;
    }
  }

  @media (max-width: 390px) {
    .site-meta {
      gap: 5px;
      width: calc(100% - 16px);
    }

    .site-url,
    .wechat-line,
    .icp-link {
      font-size: 7px;
    }
  }
</style>
</head>
<body>
  <main>
    <section class="hero" aria-label="传家宝首页">
      <nav class="nav" aria-label="页面标识">
        <div class="brand">
          <strong>传家宝</strong>
          <span>Heirloom</span>
        </div>
        <a class="corner-mark" href="#" aria-label="传家宝">传</a>
      </nav>

      <div class="hero-inner">
        <div class="copy">
          <h1><span>在遗忘之前，</span><span>记住</span></h1>
          <p class="hero-en">Before Memory Fades, Remember</p>
          <p class="lead">传家宝，陪你和家人，把那些没说出口的故事，一点点找回来。</p>
          <p class="lead-en">Heirloom helps you and your family gently recover the stories that were never said out loud.</p>

          <div class="actions" aria-label="首页操作">
            <a class="button primary" href="/happiness-curve.html">
              <span>开始</span>
              <small>Start</small>
            </a>
          </div>
        </div>
      </div>

      <div class="site-meta" aria-label="官网、微信与备案">
        <a class="site-url" href="https://chuanjiabao.vip/" target="_blank" rel="noopener">chuanjiabao.vip</a>
        <span class="wechat-line">WeChat: gaoqiantongxue</span>
        <a class="icp-link" href="https://beian.miit.gov.cn/" target="_blank" rel="noopener">蜀ICP备2026029077号-1</a>
      </div>
    </section>

  </main>
</body>
</html>
